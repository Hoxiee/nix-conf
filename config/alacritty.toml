# Alacritty configuration.
# Full reference: https://alacritty.org/config-alacritty.html
 
[window]
padding = { x = 12, y = 12 }
decorations = "None"
opacity = 0.95
blur = true
 
[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size   = 13.0
 
[cursor]
style = { shape = "Beam", blinking = "On" }
 
[scrolling]
history   = 10000
multiplier = 3
 
# Colors — replace with your preferred scheme.
[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
 
[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"
 
[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"
 