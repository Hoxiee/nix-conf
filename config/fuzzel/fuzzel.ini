# Fuzzel launcher configuration.
# Full reference: https://man.archlinux.org/man/fuzzel.ini.5

[main]
font=JetBrainsMono Nerd Font:size=13
terminal=alacritty -e
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=1e1e2eff
text=cdd6f4ff
match=89b4faff
selection=313244ff
selection-text=cdd6f4ff
border=89b4fa66

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes
